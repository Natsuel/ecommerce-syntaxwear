<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="SyntaXWear é a sua loja online de tênis e sneakers. Encontre os melhores modelos, desde os clássicos até os lançamentos mais recentes. Compre com segurança e estilo na SyntaXWear.">
  <title>SyntaXWear - Tênis e Sneakers Online</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">

  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/components/hero.css">
  <link rel="stylesheet" href="./css/components/panel.css">

  <link rel="stylesheet" href="./css/components/product-category.css">
  <link rel="stylesheet" href="./css/components/product-grid.css">
  <link rel="stylesheet" href="./css/components/footer.css">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <h1 class="logo">
      <a href="/" title="SyntaXWear - Tênis e Sneakers Online">
        <img src="./images/logo/Logo.svg" alt="SyntaXWear - Tênis e Sneakers Online">
      </a>
    </h1>

    <nav class="nav-center" aria-label="Categorias Principais">
      <ul>
        <li>
          <a href="#">Masculino</a>
        </li>
        <li>
          <a href="#">Feminino</a>
        </li>
        <li>
          <a href="#">Outlet</a>
        </li>
      </ul>
    </nav>

    <nav class="nav-right" aria-label="Acesso Rápido">
      <ul>
        <li>
          <a href="#" title="Nossas Lojas">Nossas Lojas</a>
        </li>
        <li>
          <a href="#" title="Sobre">Sobre</a>
        </li>
        <li>
          <a href="#" title="Minha Conta">
            <img src="./images/icons/user.svg" alt="Minha Conta">
          </a>
        </li>
        <li>
          <a href="#" title="Ajuda">
            <img src="./images/icons/help.svg" alt="Ajuda">
          </a>
        </li>
        <li>
          <a href="#" title="Carrinho de Compras">
            <img src="./images/icons/cart.svg" alt="Carrinho de Compras">
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Seção Hero -->
  <section class="hero">
    <div class="hero-overlay">
      <div class="hero-content">
        <span class="hero-subtitle">Krypton One</span>
        <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
        <div class="hero-buttons">
          <a href="#" class="btn btn-outline">Ver modelos</a>
          <a href="#" class="btn btn-filled">Comprar</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Seção de Categorias -->
  <section class="categories">
    <div class="category-card casual">
      <a href="#" class="category-link">
        <span class="overlay"></span>
        <span class="category-name btn btn-outline">Casual</span>
      </a>
    </div>
    <div class="category-card esporte">
      <a href="#" class="category-link">
        <span class="overlay"></span>
        <span class="category-name btn btn-outline">Esporte</span>
      </a>
    </div>
    <div class="category-card moderno">
      <a href="#" class="category-link">
        <span class="overlay"></span>
        <span class="category-name btn btn-outline">Moderno</span>
      </a>
    </div>
    <div class="category-card futurista">
      <a href="#" class="category-link">
        <span class="overlay"></span>
        <span class="category-name btn btn-outline">Futurista</span>
      </a>
    </div>
  </section>

  <!-- Produtos em Destaque -->
  <section class="grid-section">
    <div class="card highlight">
      <div class="highlight-content">
        <h3 class="card-title">Krypton One</h3>
        <p class="card-subtitle">Estilo urbano com atitude.</p>
        <div class="cta-group">
          <a href="#" class="btn btn-outline">Feminino</a>
          <a href="#" class="btn btn-outline">Masculino</a>
        </div>
      </div>
    </div>
    <div class="card sneaker-purple"></div>
    <div class="card model"></div>
    <div class="card sneaker-colorful"></div>
    <div class="card sneaker-black-white"></div>
    <div class="card sneaker-silver"></div>
  </section>

  <!-- Footer -->
  <footer class="footer">
  </footer>
</body>

</html>
